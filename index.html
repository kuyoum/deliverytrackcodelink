<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipment Tracking Portal</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .tracking-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        .logo { max-width: 150px; margin-bottom: 20px; }
        h2 { color: #333; margin-bottom: 10px; font-size: 20px; }
        p { color: #666; font-size: 14px; margin-bottom: 20px; }
        input[type="text"] { width: 90%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 15px; font-size: 16px; }
        button { width: 97%; padding: 12px; background-color: #ffcc00; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; color: #000; }
        button:hover { background-color: #e6b800; }
    </style>
</head>
<body>

<div class="tracking-box">
    <h2>Track Your Shipment</h2>
    <p>Enter your tracking number below to view the status of your delivery.</p>
    <input type="text" placeholder="Tracking Number (e.g. 123456789)">
    <button type="button">Track Package</button>
</div>

</body>
</html>

<script>
    document.querySelector('button').addEventListener('click', function() {
        var trackingInput = document.querySelector('input[type="text"]').value.trim();
        if (trackingInput === "") {
            alert("Please enter a valid tracking number.");
            return;
        }
        var officialDhlUrl = "https://dhl.com" + encodeURIComponent(trackingInput);
        window.location.href = officialDhlUrl;
    });
</script>
